[package]
name = "cli"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "OpenLore CLI: composition root + verb dispatch + two-prompt UX (ADR-003)."

[lib]
path = "src/lib.rs"

[[bin]]
name = "openlore"
path = "src/main.rs"

[features]
# D-D20 / WD-21: build-time test escape hatch for the `peer remove --purge`
# interactive confirmation. When enabled (CI acceptance builds), the
# `OPENLORE_TEST_AUTOCONFIRM=1` env var bypasses the prompt. MUST NOT be
# enabled in release builds — `verbs::peer_remove::autoconfirm_purge` then
# compiles to a `const false` with no env-var read, so a shipped binary has
# provably no auto-confirm path. `cargo xtask` (step 01-06) verifies this.
test-autoconfirm = []
# Slice-03 peer-storage probe gate. OFF at this bootstrap step because the
# `DuckDbPeerStorageAdapter::probe()` body is still a RED `todo!()` scaffold
# (01-02); enabling the gauntlet entry would panic the binary. Flipped on
# once the real probe lands with the PS-* scenarios (I-FED-3 enforces a
# non-stub body via xtask check-probes at that point).
peer-storage-probe-live = []

# DRIVER / composition root. Only crate allowed to depend on adapter-*.
[dependencies]
ports = { path = "../ports" }
claim-domain = { path = "../claim-domain" }
lexicon = { path = "../lexicon" }
adapter-duckdb = { path = "../adapter-duckdb" }
adapter-atproto-did = { path = "../adapter-atproto-did" }
adapter-atproto-pds = { path = "../adapter-atproto-pds" }
adapter-system-clock = { path = "../adapter-system-clock" }
clap = { version = "4", features = ["derive"] }
tokio = { workspace = true, features = ["macros", "rt"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = "0.8"

# Acceptance tests live at the workspace root (`tests/acceptance/*.rs`)
# per DISTILL's authored scaffolds, but the openlore binary they drive
# is THIS crate's [[bin]] — so the cli package owns the test targets
# and assert_cmd::Command::cargo_bin("openlore") resolves correctly.
[dev-dependencies]
openlore-test-support = { path = "../test-support" }
assert_cmd = { workspace = true }
tempfile = { workspace = true }
proptest = { workspace = true }
serde_json = { workspace = true }
# Step 05-08: acceptance tests for WS-8+ query DuckDB publication
# metadata directly (no StoragePort surface for it yet — that lands
# with graph-query later in phase 05). Dev-only — production cli code
# goes through StoragePort.
duckdb = { version = "1.3", features = ["bundled", "chrono"] }
chrono = { workspace = true }

[[test]]
name = "walking_skeleton"
path = "../../tests/acceptance/walking_skeleton.rs"
harness = true

[[test]]
name = "lexicon_conformance"
path = "../../tests/acceptance/lexicon_conformance.rs"
harness = true

[[test]]
name = "federation_roundtrip"
path = "../../tests/acceptance/federation_roundtrip.rs"
harness = true

# Slice-03 layer-2 lexicon-conformance acceptance (counter-claim). Like
# `lexicon_conformance` above it exercises the pure core (`lexicon` +
# `claim_domain`) DIRECTLY — no CLI subprocess — so it lives under the
# cli package's test targets purely for workspace co-location. Step 02-01
# activates the LCC-1 scenario; sibling scenarios stay RED (`todo!()`).
[[test]]
name = "lexicon_counter_claim"
path = "../../tests/acceptance/lexicon_counter_claim.rs"
harness = true
