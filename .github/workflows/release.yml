# Release — build + sign + publish the openlore CLI binaries on a v* tag.
#
# Feature: github-release-binaries (DEVOPS design: Apex).
# Governs / consumes: ADR-011 (4-platform release matrix + tarball naming),
# ADR-012 (supply-chain: cosign keyless + CycloneDX SBOM + SLSA provenance).
# Spec: docs/feature/github-release-binaries/environments.yaml (the SSOT for
# this matrix). Unblocks: homebrew-binary-distribution (the formula reads the
# GitHub-Release tarball names + .sha256 produced here).
#
# Job DAG:
#   verify ──▶ build-release (matrix ×4) ──▶ release (sign + sbom + provenance + publish)
#                                                │
#     # EXTENSION POINT — reserved (do NOT build here):
#     # bump-formula  needs: [release]   ← homebrew-binary-distribution OD-HB-2
#     #   reads the published *.sha256 and commits the tap formula bump to main
#     #   (trunk-based, no PR). Slots in as ONE job; no restructure. See
#     #   docs/feature/homebrew-binary-distribution/feature-delta.md.
#
# IMPLEMENTATION NOTE: Apex's design names a 4th job (sign-sbom-provenance)
# distinct from publish. They are merged here into the single `release` job for
# artifact-locality — cosign, the SBOM, the provenance attestation, and the
# upload all operate on the same downloaded tarball set in one place, avoiding a
# fragile re-upload of .sig/.cert between jobs. The logical stage boundary is
# preserved by the step grouping + comments below.
#
# DEFERRED (ci-cd-pipeline.md §7.1 heavy set — intentionally NOT built here;
# each has an unbuilt prerequisite or a secret requirement):
#   - crates.io publish (needs CRATES_IO_TOKEN)   -> future slice: cratesio-publish
#   - 8-cell substrate gold-matrix gate           -> future slice: substrate-gold-matrix-gate
#   - full cargo-mutants release gate             -> future slice: mutation-release-gate
#   - Pact vs real bsky.social (PACT_REAL_PDS=1)  -> future slice: pact-real-pds-release-gate

name: Release

on:
  push:
    tags:
      - 'v*'

# Never cancel a half-published release (DA-3/DA-4). Serialize per tag ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default least privilege; the release job elevates for OIDC signing + upload.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # verify — re-run ci.yml's commit + acceptance gates on the tagged ref.
  # Mirrors .github/workflows/ci.yml conventions (checkout@v4,
  # rust-toolchain@stable, rust-cache@v2, install-action@v2, nextest
  # --test-threads=1). No NEW gates are introduced here.
  # ---------------------------------------------------------------------------
  verify:
    name: verify (commit + acceptance gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,nextest
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo deny check
        run: cargo deny check
      - name: cargo test -p xtask (arch-rule unit + integration tests)
        run: cargo test -p xtask
      - name: cargo xtask check-arch
        run: cargo run -p xtask -- check-arch
      - name: cargo xtask check-probes
        run: cargo run -p xtask -- check-probes
      - name: Build binaries the acceptance tests spawn (openlore + openlore-indexer)
        # Several acceptance suites (appview_search, indexer_ingest,
        # viewer_network_search, search_hide_retracted, …) spawn the `openlore`
        # and the CROSS-package `openlore-indexer` executables via the test-support
        # resolver, which locates them in target/debug. `nextest` builds test
        # harnesses, NOT these `[[bin]]` targets (openlore-indexer is bin-only, so
        # cli's dev-dependency on it is ignored) — so build them explicitly first.
        # The test files themselves document this "Build-before-run" requirement.
        run: cargo build --bin openlore --bin openlore-indexer
      - name: cargo nextest run --workspace
        # --test-threads=1 works around the adapter-system-clock OPENLORE_TEST_NOW
        # env-var race (see ci.yml header). Keep in lock-step with ci.yml.
        run: cargo nextest run --workspace --test-threads=1

  # ---------------------------------------------------------------------------
  # build-release — 4 NATIVE builds (ADR-011; no cross-compile). Each runner is
  # native to its triple, so we build without --target and read target/release.
  # Emits openlore-{version}-{triple}.tar.gz + .sha256, uploaded as a workflow
  # artifact for the release job. fail-fast:false so one platform failing does
  # not silently drop the others (DA-7) — all 4 must succeed for release.
  # ---------------------------------------------------------------------------
  build-release:
    name: build ${{ matrix.triple }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            runner: macos-14              # native (Apple Silicon)
          - triple: x86_64-apple-darwin
            # CROSS-COMPILED from the Apple-Silicon macos-14 runner rather than a
            # native macos-13 Intel runner. GitHub's Intel-macOS runners are scarce
            # and deprecation-tracked (ADR-011 flagged macos-13 as "the last Intel
            # image"); depending on one left this cell QUEUED indefinitely. macOS
            # arm64→x86_64 cross-compile is well-supported (universal SDK + clang
            # multi-arch). RELAXES ADR-011's "native build per target" for this one
            # cell — noted here + in the release. All cells build via `--target`.
            runner: macos-14
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest         # native
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm      # native (GitHub-hosted arm64 Linux)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Install the exact target so every cell builds via `--target` — native
          # for 3 cells, cross (arm64→x86_64 macOS) for x86_64-apple-darwin.
          targets: ${{ matrix.triple }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.triple }}

      - name: Assert tag version == cli Cargo version (DA-5)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Allow a pre-release suffix (e.g. 0.1.0-rc1) to validate against the
          # crate's 0.1.0 — the tarball still carries the full tag version, but
          # the BASE (before the first '-') must equal the crate version. This
          # still catches genuine drift (tag v0.2.0 vs crate 0.1.0 fails).
          BASE_VERSION="${VERSION%%-*}"
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "cli") | .version')"
          echo "tag=$VERSION base=$BASE_VERSION cli-crate=$CARGO_VERSION"
          if [ "$BASE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (base $BASE_VERSION) != cli Cargo version ($CARGO_VERSION). Bump crates/cli/Cargo.toml or fix the tag."
            exit 1
          fi

      - name: Build release binary
        shell: bash
        # Explicit --target for every cell (native for 3, cross for x86_64-apple-darwin).
        run: cargo build --release -p cli --bin openlore --target ${{ matrix.triple }}

      - name: Package tarball + sha256
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TRIPLE="${{ matrix.triple }}"
          NAME="openlore-${VERSION}-${TRIPLE}.tar.gz"
          # With --target, the binary lands under target/<triple>/release/.
          tar -czf "$NAME" -C "target/${TRIPLE}/release" openlore
          # shasum -a 256 exists on both macOS and Ubuntu runners (portable).
          shasum -a 256 "$NAME" > "$NAME.sha256"
          echo "Built $NAME"
          shasum -a 256 -c "$NAME.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.triple }}
          path: |
            openlore-*.tar.gz
            openlore-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # release — sign (cosign keyless) + SBOM (CycloneDX) + provenance (SLSA) +
  # publish (GitHub Release). All OIDC/first-party; NO long-lived secrets (DA-6).
  # This is the ONLY job that exercises contents:write, and only after verify +
  # all 4 builds pass (DA-3: no partial publish).
  # ---------------------------------------------------------------------------
  release:
    name: sign + sbom + provenance + publish
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the Release + upload assets
      id-token: write       # GitHub OIDC: cosign keyless + SLSA attestation
      attestations: write   # record build-provenance attestations
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -l dist/

      # --- stage: SBOM (CycloneDX, release-wide, from the committed Cargo.lock) ---
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          # cargo-cyclonedx 0.5.x: scope with --manifest-path (NOT --package, which
          # it rejects), and --override-filename controls the base name. It writes a
          # per-package `sbom.json` in EACH crate dir; the cli package's SBOM (the
          # shipped binary's dependency tree) is the one we publish as sbom.cdx.json.
          cargo cyclonedx --format json --manifest-path crates/cli/Cargo.toml --override-filename sbom
          if [ ! -f crates/cli/sbom.json ]; then
            echo "::error::cli CycloneDX SBOM not produced"
            find . -name 'sbom.json' -not -path './target/*' | head
            exit 1
          fi
          cp crates/cli/sbom.json dist/sbom.cdx.json
          echo "SBOM: crates/cli/sbom.json -> dist/sbom.cdx.json ($(wc -c < dist/sbom.cdx.json) bytes)"

      # --- stage: cosign keyless sign each tarball (.sig + .cert per tarball) ---
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign tarballs (cosign keyless, OIDC)
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/openlore-*.tar.gz; do
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.cert" \
              "$f"
          done

      # --- stage: SLSA build provenance attestation over the 4 tarballs ---
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/openlore-*.tar.gz'

      # --- stage: publish to GitHub Releases ---
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release notes come from the annotated tag message (no CHANGELOG.md
          # exists yet — environments.yaml changelog_source). generate_release_notes
          # appends the commit list; the tag message body leads.
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Auto-mark any tag carrying a pre-release suffix (e.g. v0.1.0-rc1) as
          # a GitHub pre-release so RC validation runs never look like a GA cut.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/openlore-*.tar.gz
            dist/openlore-*.tar.gz.sha256
            dist/openlore-*.tar.gz.sig
            dist/openlore-*.tar.gz.cert
            dist/sbom.cdx.json
          body: |
            OpenLore `${{ github.ref_name }}` — prebuilt `openlore` CLI binaries.

            ## Verify a download (optional, recommended)
            ```sh
            # 1. checksum
            shasum -a 256 -c openlore-*-<triple>.tar.gz.sha256

            # 2. cosign keyless signature (anchored to this workflow's OIDC identity)
            cosign verify-blob \
              --certificate openlore-*-<triple>.tar.gz.cert \
              --signature   openlore-*-<triple>.tar.gz.sig \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              openlore-*-<triple>.tar.gz

            # 3. review the dependency SBOM
            #    cyclonedx analyze --input-file sbom.cdx.json
            ```
            Supply-chain policy: ADR-012. Release matrix: ADR-011.
