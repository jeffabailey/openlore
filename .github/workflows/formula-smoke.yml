# Formula smoke test — feature homebrew-binary-distribution.
#
# Runs the REAL user-facing `brew tap → trust → install` flow against the live tap +
# GitHub Release and asserts `openlore --version`, so a broken formula (bad sha256,
# missing release asset, tap/trust regression) fails CI instead of the user. Triggers
# whenever the formula (or this test) changes on main — including the release.yml
# `bump-formula` autobump commit — plus on demand.
name: Formula smoke test

on:
  push:
    branches: [main]
    paths:
      - "Formula/openlore.rb"
      - "scripts/release/smoke-test-formula.sh"
      - ".github/workflows/formula-smoke.yml"
  workflow_dispatch:

concurrency:
  group: formula-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: brew install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (aarch64-apple-darwin), ubuntu-latest = x86_64 Linux.
        # x86_64-apple-darwin + aarch64-linux paths are validated by release.yml's build
        # matrix; Intel-mac runners are scarce (ADR-011) so they are not smoke-tested here.
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Put Homebrew on PATH
        shell: bash
        # macOS runners ship brew on PATH already; ubuntu runners have Linuxbrew
        # installed at the standard prefix but do NOT export it — add it so the
        # smoke script's `brew` resolves. No-op on macOS (the dir is absent).
        run: |
          if [ -d /home/linuxbrew/.linuxbrew/bin ]; then
            echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          fi
      - name: brew tap → trust → install → version
        run: bash scripts/release/smoke-test-formula.sh
