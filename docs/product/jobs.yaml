schema_version: 1
# OpenLore Jobs-To-Be-Done registry.
# Every user story across every feature references one of these `id`s via `job_id`.
# A story may instead set `job_id: infrastructure-only` IF it also carries
# `infrastructure_rationale` and the slice still contains >=1 non-infra story.

jobs:

  - id: J-001
    name: Author a signed philosophical claim
    primary: true
    walking_skeleton: true
    job_story: >
      When I learn a project embodies a philosophy I care about,
      I want to record it as a signed evidence-backed claim,
      so I can publish my reasoning without forcing it on others.

    functional:
      - Capture (subject, predicate, object, evidence, confidence) in a structured record.
      - Sign it with the author's DID so provenance is portable and verifiable.
      - Persist locally first; publishing to ATProto is a separate, deferrable step.

    emotional:
      - Relief: "I am claiming, not asserting truth."
      - Confidence: the record I sign is exactly what others will read.
      - Lowered stakes: I can revise, retract, or counter-claim later.

    social:
      - Be a thoughtful citizen of a federated knowledge graph.
      - Avoid the centralized-wiki failure mode where edits feel like a fight.
      - Establish a public reasoning trail others can engage with.

    four_forces:
      push: >
        Today philosophical claims about projects live in blog posts, README rants,
        and Twitter threads. They are unstructured, unsigned, and undiscoverable.
      pull: >
        A signed, evidence-anchored, locally-owned claim that others can federate,
        weight, or disagree with — without me having to argue them down first.
      anxiety: >
        "Am I being asked to assert this is TRUE? What if I'm wrong? What if
        someone with more authority disagrees and brigades my claim?"
        Mitigation: claims are framed as the author's reasoning, carry an explicit
        confidence value, and are counter-claimable rather than overwrite-able.
      habit: >
        Engineers already write blog posts and README opinions. The new behavior
        (structured signed claim) must feel at most as heavy as `git commit -m`.

    opportunity_score:
      importance: 9     # core feature: without this nothing else works
      satisfaction: 2   # no existing tool does this well
      score: 16         # importance + max(importance - satisfaction, 0) = 9 + 7
      verdict: underserved-primary

    success_signals:
      - A claim written in <2 minutes once the user knows the predicate vocabulary.
      - User can read back their own claim and recognize it as their reasoning.
      - User feels safe publishing because retraction/counter-claim is first-class.

    related_jobs: [J-002, J-003, J-004]


  - id: J-002
    name: Explore the philosophy graph to inform a decision
    primary: false
    walking_skeleton_for: openlore-scoring-graph   # PRIMARY for slice-04
    job_story: >
      When I'm choosing a tech stack or evaluating a community,
      I want to see what philosophies a project embodies and who else holds those
      philosophies, so I can pick projects aligned with how I want to build.

    functional:
      - Query the local graph by subject (project), object (philosophy), or contributor.
      - Traverse contributor<->project<->philosophy edges.
      - See weights/confidence so I can distinguish well-supported claims from speculation.

    emotional:
      - Curiosity satisfied without sinking hours into hand-research.
      - Confidence to defend the decision: "I picked Rust because X, Y, Z philosophies
        align with how my team works, and here are the people who back that up."

    social:
      - Make tech choices defensible to teammates with shared vocabulary.
      - Surface alignment with named individuals one already respects.

    four_forces:
      push: >
        Stack-choice today is vibes + Hacker News threads. Hard to articulate WHY
        a community feels right.
      pull: >
        A query that returns "projects sharing philosophy X, and the contributors
        who span them" with a defensible weight per edge.
      anxiety: >
        "What if the graph is sparse, biased toward popular projects, or full of
        speculative claims and I make a bad call?" Mitigation: confidence and
        evidence are first-class; sparse subgraphs render as sparse, not as confident.
      habit: >
        Engineers already run `gh search` and skim READMEs. Graph query must
        feel like a natural extension, not a separate cognitive surface.

    opportunity_score:
      importance: 8
      satisfaction: 2
      score: 14                      # underserved-secondary at umbrella scope; promoted to
                                     # underserved-primary-for-slice for slice-04 (scoring-graph)
      verdict: underserved-primary-for-slice   # primary for slice-04 (openlore-scoring-graph)

    success_signals:
      - User can run one query and surface a non-obvious connection.
      - User refers to a query result when justifying a stack choice within 30 days.
      - User can reproduce a displayed adherence weight by hand from the formula
        and the --explain per-claim arithmetic (scoring-transparency signal, slice-04).
      - A sparse subgraph is recognized AS sparse and treated as a lead, not a
        conclusion (no false confidence from thin evidence, slice-04).

    related_jobs: [J-001, J-003, J-004]

    # Sub-jobs surfaced during slice-04 (scoring-graph) DISCUSS — each is an
    # aspect of J-002, NOT a separate primary job, but each merits an Elevator
    # Pitch in the corresponding user story.
    sub_jobs:
      - id: J-002a
        name: Query the graph by dimension (subject / object / contributor)
        story: >
          When I'm orienting a decision, I want to query the local graph by
          project, by philosophy, or by contributor — and see who claims what
          with explicit attribution — so I can start from whichever dimension
          matches how I'm thinking, not just from projects I already know.
        load_bearing: true
        rationale: >
          The object (philosophy) and contributor dimensions are the new orienting
          surfaces; the subject dimension is inherited from slice-01. Every
          dimension preserves per-author attribution — a list is never collapsed
          into a faceless aggregate (anti-merging carried from slice-03 I-FED-1).

      - id: J-002b
        name: Traverse contributor<->project<->philosophy edges
        story: >
          When I want to find the non-obvious connection — who spans the projects
          I'm evaluating — I want to traverse the graph's edges, where each edge
          is one signed claim, so I can surface an alignment I could never get
          from `gh search` plus skimming READMEs.
        load_bearing: true
        rationale: >
          Traversal is the headline J-002 success signal ("surface a non-obvious
          connection in one query"). Every edge MUST map to exactly one signed
          claim; traversal invents no edges. Bounded depth prevents fan-out
          explosion.

      - id: J-002c
        name: See transparent, auditable adherence weighting
        story: >
          When I weigh projects on a philosophy, I want a SMALL transparent
          weight (count x confidence x multi-project/author triangulation, no ML)
          that I can reproduce by hand and that renders thin evidence honestly as
          sparse, so I can distinguish well-supported claims from speculation
          without fearing a bad call on biased or sparse data.
        load_bearing: true
        rationale: >
          Directly mitigates the J-002 anxiety. Weights are DERIVED +
          DISPLAY-ONLY (never persisted/signed/published — extends WD-10's
          display-only-bucket discipline). The formula is displayed and
          --explain reproduces the per-claim arithmetic. NO ML (would make the
          score unauditable). A score is an AGGREGATE VIEW, never a merge that
          loses per-author attribution.


  - id: J-003
    name: Read another developer's federated claims with weighting
    primary: false                  # secondary to J-001 at the umbrella level
    walking_skeleton_for: openlore-federated-read   # but PRIMARY for slice-03
    job_story: >
      When I read another developer's published claims,
      I want to weigh them by their evidence and signing identity,
      so I can synthesize a view without inheriting their conclusions.

    functional:
      - Subscribe to or pull claims from another DID via ATProto.
      - Merge them into a local view with explicit author attribution preserved.
      - Apply user-configurable weights (trust score by author, evidence threshold).
      - Unsubscribe cleanly with no lingering data.

    emotional:
      - "I can engage with their reasoning without endorsing it."
      - Sovereignty: my local view is mine; their claims do not overwrite anything.
      - Reversibility: I subscribed; I can leave without trace.

    social:
      - Cite a peer's claim with attribution intact.
      - Engage in disagreement without flame-war: post a counter-claim.

    four_forces:
      push: >
        Aggregator sites (HN, Reddit, awesome-lists) collapse provenance and tone.
        I cannot tell whose reasoning I'm inheriting. When someone I respect
        publishes a take, I cannot easily disagree publicly without it feeling
        like a fight.
      pull: >
        A federated read where each claim carries its author, evidence, and confidence,
        and I control how to weight them. Disagreement becomes a counter-claim
        that stands on its own — not a reply-guy thread.
      anxiety: >
        Multiple distinct anxieties drive J-003:
        (a) "What if I accidentally absorb a bad-actor's claims into my reasoning?"
            Mitigation: claims are never silently merged; they enter a separate
            attribution layer that I explicitly weight.
        (b) "What if I subscribe to a DID I later regret subscribing to — is
            subscription a one-way commitment?"
            Mitigation: `openlore peer remove` is first-class and purges peer
            claims on request.
        (c) "What if I publish a counter-claim and the peer's followers brigade
            me?" — same as J-001 anxiety; mitigated by claim-not-truth framing
            and soft-retract semantics.
      habit: >
        Devs already follow people on GitHub, Mastodon, blogs. Following a DID's
        claim stream must feel comparable. Reading claims by subject must feel
        like running `gh search` — not opening a separate cognitive surface.

    opportunity_score:
      importance: 8                  # raised from 7: federation contract is load-bearing
      satisfaction: 1
      score: 15                      # 8 + max(8-1, 0) = 15
      verdict: underserved-primary-for-slice

    success_signals:
      - User pulls another DID's claims and can answer "who said what, with what
        evidence" in <30 seconds.
      - User posts a counter-claim within first month of using federated read.
      - User unsubscribes from a peer at least once and reports zero lingering
        data in their local store (sovereignty signal).
      - When a peer publishes a counter-claim against the user's claim, the user
        learns of it within their next `peer pull` AND knows how to engage or
        move on (no surprise-brigade aftermath).

    related_jobs: [J-001, J-002]

    # Sub-jobs surfaced during slice-03 DISCUSS — each is an aspect of J-003,
    # NOT a separate primary job, but each merits an Elevator Pitch in the
    # corresponding user story.
    sub_jobs:
      - id: J-003a
        name: Attribute every peer claim without merging
        story: >
          When I read a peer's claim, I want to instantly see WHO is making the
          claim and weigh their authority myself, so I never confuse one
          developer's opinion with a community consensus.
        load_bearing: true
        rationale: >
          This is the anti-merging principle. Violating it collapses the entire
          OpenLore trust model into yet another aggregator. Every UI surface
          MUST show author DID; no "consensus view" anywhere, ever.

      - id: J-003b
        name: Counter-claim authoring as first-class disagreement
        story: >
          When a peer publishes a claim I disagree with, I want to publish a
          counter-claim that stands on its own — not a reply on their record —
          so disagreement is a public structured artifact rather than a thread.

      - id: J-003c
        name: Subscription is revocable without residue
        story: >
          When I subscribe to a DID I later regret subscribing to, I want to
          unsubscribe cleanly with no lingering data, so subscription isn't a
          one-way commitment.


  - id: J-004
    name: Evaluate a contributor's body of work through a philosophy lens
    primary: false
    job_story: >
      When I'm evaluating a person's body of work for hiring, collaboration, or
      learning, I want to see which philosophies their contributions support,
      so I can find collaborators who think like me.

    functional:
      - Resolve a contributor (GitHub handle, DID) to their contribution graph.
      - For each philosophy edge, show triangulating evidence across projects.
      - Surface adherence weighting (multi-project triangulation increases weight).

    emotional:
      - "I'm not stalking; I'm reading their published reasoning trail."
      - Lowers the social cost of cold-outreach because the alignment is visible.

    social:
      - Find collaborators whose values are visible, not just inferred.
      - Reduce mis-hires/mis-collabs grounded in stack-skill alone.

    four_forces:
      push: >
        LinkedIn/GitHub show what someone built; they hide how/why they think.
      pull: >
        A view that synthesizes contributions across projects into a philosophy
        adherence profile, with the underlying claims auditable.
      anxiety: >
        "Will this become a surveillance tool / blacklist mechanism?" Mitigation:
        only public signed claims are aggregated; the contributor is the subject
        of a claim, not a controller of it; counter-claim and retraction first-class.
      habit: >
        Engineers already scroll someone's GitHub profile. Profile-as-philosophy
        view must layer onto that habit, not replace it.

    opportunity_score:
      importance: 7                  # raised from 6: scraper is the cost-lowering lever
      satisfaction: 1
      score: 13                      # 7 + max(7-1, 0) = 13
      verdict: underserved-primary-for-slice   # primary for slice-02 (github-scraper)

    success_signals:
      - User identifies a non-obvious collaborator candidate via the lens within 60 days.
      - Lens output is shareable as a link to a query, not just a static dump.
      - User produces an evidence-backed claim about a contributor/repo in
        under 2 minutes by reviewing scraper candidates instead of authoring
        from scratch (slice-02 cost-lowering signal).
      - User edits at least one scraper-proposed candidate before signing it
        (proves the human-in-the-loop is real, not rubber-stamped).

    related_jobs: [J-001, J-002, J-003]

    # Sub-jobs surfaced during slice-02 (github-scraper) DISCUSS — each is an
    # aspect of J-004, NOT a separate primary job, but each merits an Elevator
    # Pitch in the corresponding user story.
    sub_jobs:
      - id: J-004a
        name: Harvest a contributor's/repo's public GitHub signals
        story: >
          When I want to evaluate a repo or contributor through a philosophy
          lens, I want the tool to gather their PUBLIC GitHub artifacts (READMEs,
          docs, dependency manifests, commit/PR/issue patterns) for me, so I do
          not have to manually open twenty browser tabs to form an impression.
        load_bearing: true
        rationale: >
          This is the cost-lowering lever. Without harvest, J-004 stays a
          manual-research job and the scraper has no reason to exist. ONLY public
          data; the contributor is the SUBJECT of a claim, never a controller.

      - id: J-004b
        name: Derive editable candidate claims from harvested signals
        story: >
          When the tool has harvested a target's signals, I want it to PROPOSE
          a small set of candidate claims (each with a suggested predicate,
          evidence URL, and a conservative confidence), so I have a strong
          starting point I can edit rather than a blank compose prompt.
        load_bearing: true
        rationale: >
          The derivation is PURE (scraper-domain) and must be auditable: every
          candidate names the exact signal that produced it. The mapping from
          signal to philosophy predicate is small and human-editable.

      - id: J-004c
        name: The human always signs — the scraper never asserts
        story: >
          When I review scraper-proposed candidates, I want to select, edit, and
          sign them through the SAME compose-sign-publish pipeline I already use
          for hand-authored claims, so the scraper lowers cost without ever
          turning my reasoning into a machine's assertion.
        load_bearing: true
        rationale: >
          Preserves the slice-01 "claims are signed human assertions" invariant.
          NO candidate is ever persisted as a signed claim or auto-published.
          Candidates are conservative-confidence (default <0.3 speculative)
          until the human reviews and adjusts.

    # The signal->predicate default mapping for slice-02. SMALL and auditable by
    # design; the human edits any candidate before signing. DESIGN owns the
    # exact serde shape; this is the product-level default set.
    signal_predicate_mapping:
      - signal: "Dependency manifest pins exact versions (Cargo.lock committed, == pins)"
        predicate: org.openlore.philosophy.dependency-pinning
        default_confidence: 0.25      # speculative; human adjusts before signing
      - signal: "Docs directory present + README > 200 lines + doc-comment density high"
        predicate: org.openlore.philosophy.documentation-first
        default_confidence: 0.25
      - signal: "Test-to-source file ratio > 0.5 OR CI runs a test matrix"
        predicate: org.openlore.philosophy.test-driven
        default_confidence: 0.25
      - signal: "Tags follow semver + CHANGELOG present"
        predicate: org.openlore.philosophy.semantic-versioning
        default_confidence: 0.25
      - signal: "Primary language is Rust OR memory-safety language + no unsafe blocks"
        predicate: org.openlore.philosophy.memory-safety
        default_confidence: 0.25


# ---------------------------------------------------------------------------
# Red cards — all resolved 2026-05-25. Retained here for decision provenance.
# Binding form lives in docs/feature/openlore-foundation/feature-delta.md
# under "Locked Decisions" (WD-9..WD-13).
# ---------------------------------------------------------------------------
red_cards:
  - id: RC-01
    question: >
      Confidence semantics: numeric [0.0, 1.0] with display-only buckets
      (speculative <0.3, weighted 0.3-0.7, well-evidenced 0.7-0.9, triangulated >0.9)?
      Or pure numeric? Or buckets-only?
    proposed_default: numeric [0.0, 1.0] + display-only buckets
    resolved:
      date: "2026-05-25"
      verdict: >
        Numeric [0.0, 1.0] is the only persisted form on the signed claim.
        Buckets are display-only: speculative <0.3, weighted 0.3-0.7,
        well-evidenced 0.7-0.9, triangulated >0.9. Buckets MUST NEVER appear
        in the signed payload, the local store, or the PDS record.
      authority: feature-delta.md WD-10 (locks OD-2)
    impacts: [J-001, J-002, J-003, J-004]

  - id: RC-02
    question: >
      Retraction model: hard-delete (claim gone from PDS), soft-retract (claim still
      readable but marked retracted), or counter-claim-only (no retractions, just
      newer claims override)?
    proposed_default: soft-retract + counter-claim-only — never hard-delete
    resolved:
      date: "2026-05-25"
      verdict: >
        Retraction is a counter-claim that references the original CID.
        Soft-retract only; the PDS-published record persists. Hard-delete is
        explicitly forbidden, even with --force.
      authority: feature-delta.md WD-11 (locks OD-3)
    impacts: [J-001, J-003]

  - id: RC-03
    question: >
      Does the user's signing identity = their existing ATProto DID (e.g. their
      bsky.social handle), or does OpenLore mint a separate did:plc for claims?
    proposed_default: reuse existing ATProto DID; separate key derivation per app.
    resolved:
      date: "2026-05-25"
      verdict: >
        Reuse the user's existing ATProto DID with a per-application derived key
        so OpenLore claims can be revoked independently of the user's main ATProto
        identity. No fresh DID is minted.
      authority: feature-delta.md WD-12 (locks OD-4)
    impacts: [J-001, J-003]

changelog:
  - date: "2026-05-25"
    feature: openlore-foundation
    change: Initial bootstrap; 4 jobs derived from brief + JTBD analysis.
  - date: "2026-05-25"
    feature: openlore-foundation
    change: RC-01, RC-02, RC-03 resolved by user; verdicts inlined. Binding form in feature-delta.md WD-10..WD-12.
  - date: "2026-05-27"
    feature: openlore-federated-read
    change: >
      J-003 deepened for slice-03 DISCUSS — opportunity score raised 13->15 with
      promotion to underserved-primary-for-slice; four-forces expanded (3 distinct
      anxieties surfaced: bad-actor absorption, subscription regret, brigade
      reprisal); sub-jobs J-003a (anti-merging), J-003b (counter-claim
      first-class), J-003c (revocability) added. J-003 retains primary=false at
      umbrella scope but is the walking-skeleton job for openlore-federated-read.
  - date: "2026-05-28"
    feature: openlore-github-scraper
    change: >
      J-004 deepened for slice-02 DISCUSS — opportunity score raised 11->13 with
      promotion to underserved-primary-for-slice (scraper is the cost-lowering
      lever for J-004 and bridges into J-001 authoring). Sub-jobs J-004a (harvest
      public GitHub signals), J-004b (derive editable candidate claims), J-004c
      (human always signs — scraper never asserts) added. Two cost-lowering
      success signals added. A small auditable signal->predicate default mapping
      recorded under J-004.signal_predicate_mapping (human edits before signing;
      candidates default to 0.25 speculative confidence). J-004 retains
      primary=false at umbrella scope but is the walking-skeleton job for
      openlore-github-scraper.
  - date: "2026-05-28"
    feature: openlore-scoring-graph
    change: >
      J-002 deepened for slice-04 DISCUSS — promoted to
      underserved-primary-for-slice and marked walking_skeleton_for:
      openlore-scoring-graph (opportunity score 14 unchanged; verdict raised
      from underserved-secondary). Sub-jobs J-002a (query-by-dimension:
      subject/object/contributor), J-002b (traverse contributor<->project<->
      philosophy edges, no invented edges), J-002c (transparent auditable
      adherence weighting, no ML) added. Two slice-04 success signals added
      (weight reproducible by hand via --explain; sparse recognized as sparse).
      Scoring is READ/VIEW only over existing signed claims; weights are
      DERIVED + DISPLAY-ONLY (never persisted, extending WD-10); a score is an
      AGGREGATE VIEW that never loses per-author attribution (extends slice-03
      I-FED-1). J-002 retains primary=false at umbrella scope but is the
      walking-skeleton job for openlore-scoring-graph.
