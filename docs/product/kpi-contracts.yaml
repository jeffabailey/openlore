# OpenLore KPI Contracts (cross-feature SSOT)
#
# Bootstrapped at finalize of `openlore-foundation` (slice-01 walking skeleton)
# on 2026-05-27. This file is the cross-feature single source of truth for
# outcome KPIs going forward; subsequent features extend or refine entries here.
# Per-feature KPI rationale lives in
# `docs/feature/{feature-id}/discuss/outcome-kpis.md` during active waves.
#
# Schema (per entry):
#   id:                     stable KPI identifier (e.g. KPI-1)
#   name:                   short human label
#   type:                   leading | guardrail | north-star
#   feature_origin:         the feature that introduced this KPI
#   persona:                target persona id from docs/product/personas/
#   target:                 measurable target (with units)
#   measurement_method:     how it's measured (test, telemetry, survey)
#   baseline_at_ga:         baseline value at General Availability (or status note)
#   notes:                  caveats, deferrals, links

schema_version: 1
last_updated: 2026-06-04  # slice-08 (viewer-network-search) realizes KPI-AV-1/2/3/4/5 + KPI-VIEW-2 + KPI-HX-G1/2/3 on the browser /search surface (no new KPI minted)

kpis:
  - id: KPI-1
    name: "Time-to-publish first claim (e2e wall-clock)"
    type: leading
    feature_origin: openlore-foundation
    persona: P-001
    target: "<= 2 minutes from compose_start_at to publish_success_at"
    measurement_method: "local opt-in telemetry (XDG state dir); timestamps on compose/publish events; never auto-exfiltrated"
    baseline_at_ga: "to be measured in dogfood week 1 (slice-01 ships local telemetry events; no aggregation infrastructure)"
    notes: "Telemetry hook ships in slice-01 cli via tracing spans; aggregation across users requires opt-in telemetry endpoint deferred per ADR-010."

  - id: KPI-2
    name: "Non-abandon rate of started compose sessions"
    type: leading
    feature_origin: openlore-foundation
    persona: P-001
    target: ">= 80% of started compose sessions reach publish (vs explicit cancel or abort)"
    measurement_method: "local opt-in telemetry: counter of compose_started vs publish_success vs cancel_at vs abort_at"
    baseline_at_ga: "to be measured in dogfood week 1"
    notes: "Counter increments ship in slice-01; cohort aggregation requires opt-in telemetry endpoint deferred per ADR-010."

  - id: KPI-3
    name: "Felt-framing (\"this felt like my reasoning, not a truth assertion\")"
    type: leading
    feature_origin: openlore-foundation
    persona: P-001
    target: ">= 4/5 average on a 5-point post-publish survey (opt-in, one-shot, first 50 publishes)"
    measurement_method: "one-time post-publish CLI prompt; dismissible; opt-in"
    baseline_at_ga: "instrumentation ships in slice-01 (cli +stats verb deferred to follow-up); cohort aggregation requires opt-in telemetry endpoint deferred per ADR-010"
    notes: "Survey delivery hook is implemented in cli; the +stats verb that surfaces aggregate results is a follow-up. PO owns survey copy."

  - id: KPI-4
    name: "Zero silent normalization (compose-preview == query-output)"
    type: guardrail
    feature_origin: openlore-foundation
    persona: P-001
    target: "100% field-for-field match between compose preview and post-publish graph query (zero tolerance)"
    measurement_method: "integration test on every release (tests/walking_skeleton.rs::WS-12 + tests/federation_roundtrip.rs) + telemetry counter `field_mismatch_detected` (target: 0)"
    baseline_at_ga: "verified by AT (FR-4 in tests/federation_roundtrip.rs and WS-12 in tests/walking_skeleton.rs both GREEN as of slice-01 ship)"
    notes: "Guardrail — any release that lowers this is blocked regardless of how well leading indicators move."

  - id: KPI-5
    name: "Local-first invariant (compose + sign succeed offline)"
    type: guardrail
    feature_origin: openlore-foundation
    persona: P-001
    target: "100% success of compose-and-sign with network disabled; publish must fail cleanly with retry-actionable error"
    measurement_method: "integration test on every release (tests/walking_skeleton.rs::WS-10 runs with network namespace disabled)"
    baseline_at_ga: "verified by AT (WS-10 GREEN as of slice-01 ship; the Phase 3.5 demo for US-003 also organically exercises this path by failing publish against an unreachable placeholder PDS while keeping the local file intact)"
    notes: "Guardrail — any release that lowers this is blocked. WSL2 keychain fallback path is documented (ADR-002) but not exercised in macOS dev-box CI."

  - id: KPI-6
    name: "Day-30 north star: \"would NOT have published this as a blog post\""
    type: north-star
    feature_origin: openlore-foundation
    persona: P-001
    target: ">= 60% of P-001 cohort reports at day-30 that >= 3 of their last N claims would NOT have been published as a blog post"
    measurement_method: "opt-in day-30 survey delivered via CLI prompt; scheduled relative to first publish"
    baseline_at_ga: "instrumentation ships in slice-01 (day-30 prompt scheduler hook lands in cli); cohort aggregation requires opt-in telemetry endpoint deferred per ADR-010"
    notes: "This is the actual product hypothesis; every other KPI is a leading indicator of this one. PO owns survey copy and day-30 prompt timing. Cohort analysis requires either an opt-in telemetry endpoint or manual aggregation from dogfood users."

  # --- slice-03 (openlore-federated-read), recorded at finalize 2026-05-28 ---

  - id: KPI-FED-1
    name: "Attribution fidelity (author DID preserved for every federated-query claim)"
    type: leading
    feature_origin: openlore-federated-read
    persona: P-002
    target: "100% — zero attribution loss across all federated-query output surfaces"
    measurement_method: "integration test (tests/acceptance/federated_query.rs::FQ-1 grouped-by-author) + 5-user think-aloud study at day-30; three-layer anti-merging enforcement (type FederatedRow.author_did non-Option + xtask check-arch SQL rule + behavioral FQ-1/FQ-2/FQ-8)"
    baseline_at_ga: "MET — FQ-1/FQ-2/FQ-8 GREEN as of slice-03 ship; 0 merged rows observed; also targets P-001 in reader hat"
    notes: "Leading indicator for the KPI-FED-3 north star (users cannot counter what they cannot attribute). Day-30 think-aloud study owned by nw-product-owner. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-FED-2
    name: "Zero merged-consensus rows (multi-author claims never collapsed)"
    type: guardrail
    feature_origin: openlore-federated-read
    persona: P-002
    target: "0 occurrences of merged-consensus rendering across all UI surfaces"
    measurement_method: "release-gate acceptance test (tests/acceptance/federated_query.rs::FQ-8 multi-author multi-record fixture; FQ-2 identical-content-different-author renders as two rows) + adversarial review of every output renderer"
    baseline_at_ga: "MET — FQ-8 (release-gate) + FQ-2 GREEN as of slice-03 ship; FQ-2 zero-merge assertion reviewer-confirmed genuine (counts cid: field-lines == 1 per row)"
    notes: "Guardrail — any release with > 0 merged rows is unshippable regardless of leading-indicator movement. CI alert if any run reports > 0 (release-blocking)."

  - id: KPI-FED-3
    name: "Counter-claim publication rate (J-003b disagreement as first-class artifact)"
    type: north-star
    feature_origin: openlore-federated-read
    persona: P-002
    target: ">= 30% of dogfood cohort publishes >= 1 counter-claim within 30 days of slice-03 release"
    measurement_method: "author-side tracing event `claim.counter.published{counter_cid, target_cid, target_author_did, reason_len}` per active reader-user + 30-day survey (\"did the counter-claim feel as light as a comment?\")"
    baseline_at_ga: "per-user GREEN (CC-1 publishes via slice-01 pipeline; CC-5 first-counter framing affordance ships); cohort = YELLOW — pending opt-in telemetry endpoint per DEVOPS D-D17. Implicit baseline is 0 (no counter-claim verb existed before slice-03)."
    notes: "North star of slice-03; every other KPI-FED is a leading indicator of this one. Kill criterion: < 10% at day-30 forces UX re-investigation before slice-04. Cohort aggregation requires the same opt-in telemetry endpoint deferred per ADR-010 (shared with slice-01 KPI-3/6)."

  - id: KPI-FED-4
    name: "Zero purge residue (peer remove --purge leaves no peer claims)"
    type: guardrail
    feature_origin: openlore-federated-read
    persona: P-002
    target: "100% — zero residual peer claims from a removed peer in subsequent federated queries"
    measurement_method: "release-gate acceptance test (tests/acceptance/peer_subscribe.rs::PS-6 atomic hard-purge transaction; integration gate 4) + dogfood log audit (random 5% sample of purge events, monthly)"
    baseline_at_ga: "MET — PS-6 atomic-purge GREEN as of slice-03 ship (DB rows + per-peer filesystem dir both removed in one transaction per WD-31/ADR-014)"
    notes: "Guardrail / outcome. PS-8 also enforces the --no-tty --purge refusal (WD-36) so purge cannot be silently scripted at this dogfeed maturity."

  - id: KPI-FED-5
    name: "End-to-end federation latency (subscribe -> pull -> federated query)"
    type: leading
    feature_origin: openlore-federated-read
    persona: P-002
    target: "<= 90 seconds for a peer publishing <= 20 claims"
    measurement_method: "author-side timing telemetry: tracing histogram `federation.e2e.duration_seconds` from start of `peer pull` to first row rendered by `graph query --federated`"
    baseline_at_ga: "per-user GREEN (sequential pull within budget for bounded peer claim sets); cohort = YELLOW — pending opt-in telemetry endpoint per DEVOPS D-D17"
    notes: "Leading indicator (friction kills the KPI-FED-3 behavior change). P95 dashboard bucketed by peer-cardinality (<=5, 6-20, 21-100, >100). Informational alert if P95 > 180s (escalate to PO; does not block release alone)."

  - id: KPI-FED-6
    name: "Zero invalid signatures stored (pull-time verification gate)"
    type: guardrail
    feature_origin: openlore-federated-read
    persona: P-002
    target: "100% — no signature-verification false positive accepted into peer_claims"
    measurement_method: "release-gate adversarial fixture acceptance test (tests/acceptance/peer_pull.rs::PP-3 tampered-signature rejected; PP-4 CID-mismatch rejected) driving tests/fixtures/peer-adversarial/"
    baseline_at_ga: "MET — PP-3 (release-gate) + PP-4 + PP-5 (SelfAttribution, WD-40) + PP-6 (CrossAttribution, WD-41) GREEN as of slice-03 ship; signature verify + CID recompute happen at write time"
    notes: "Guardrail / security. CI alert if any run reports != 100% (release-blocking). CAVEAT: slice-03 verifies against a test-only peer-pubkey seam (OPENLORE_PEER_PUBKEY_HEX_<did>, DV-4); production multibase (z6Mk...) decode from a real PLC DID document is deferred to slice-04+."

  # --- slice-02 (openlore-github-scraper), recorded at finalize 2026-05-28 ---
  # Per WD-13 the umbrella sequence is federation -> scrapers -> scoring ->
  # appview, so slice-02 (scrapers) shipped AFTER slice-03 (federation); these
  # KPIs are recorded alongside the slice-03 block.

  - id: KPI-SCR-1
    name: "Cost-to-first-signed-claim via the scraper (scrape github -> sign, e2e wall-clock)"
    type: leading
    feature_origin: openlore-github-scraper
    persona: P-002
    target: "< 2 minutes from `scrape github` invocation to signed claim, INCLUDING predicate-vocabulary discovery (vs the slice-01 hand-authoring baseline of <2 min once vocabulary is known)"
    measurement_method: "author-side timing telemetry (tracing histogram `scrape.to_sign.duration_seconds`) + 30-day think-aloud study; P50 + P95 dashboard bucketed by target-type (small repo / large repo / contributor-user) per DEVOPS D-D26"
    baseline_at_ga: "per-user GREEN (SG-1 harvest->propose + SS-1 sign-via-slice-01 pipeline both GREEN as of slice-02 ship); cohort = YELLOW — pending opt-in telemetry endpoint per DEVOPS D-D26. Comparison baseline is the slice-01 hand-authoring time (J-001 success signal)."
    notes: "North star of slice-02 (the scraper EXISTS to lower the cost of producing well-evidenced claims). Also targets P-001 in the evaluator hat. Disprover / kill criterion: P95 > 4 minutes (2x budget) forces candidate-review UX re-investigation before slice-04. Cohort aggregation requires the same opt-in telemetry endpoint deferred per ADR-010 (shared with slice-01 KPI-1/3/6). Informational alert if P95 > 4 min (escalate to PO; does not block release alone)."

  - id: KPI-SCR-2
    name: "Human-gate: zero unsigned persistence / auto-publish (scrape without --sign signs nothing)"
    type: guardrail
    feature_origin: openlore-github-scraper
    persona: P-002
    target: "100% — zero unsigned persistence; zero auto-publish; confidence never auto-inflated above the 0.25 default by the tool"
    measurement_method: "release-gate acceptance tests `scraper_never_persists_unsigned` (SG-1/SG-8/SG-9: zero author_claims rows + zero PDS writes + zero claims/<cid>.json files) + `candidate_confidence_no_autoinflate` (SD-2 @property proposal half + SS-2 sign half)"
    baseline_at_ga: "MET — SG-1/SG-8/SG-9 + SD-2 + SS-2 GREEN as of slice-02 ship; the `CandidatePrefill` bridge reuses the slice-01 single-publish-path (I-SCR-6), so the only way a candidate becomes a claim is the human signing it"
    notes: "Guardrail / outcome. Any unsigned persistence or auto-publish is a fatal failure of the human-gate and the slice-01 'claims are signed human assertions' invariant — UNSHIPPABLE. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-SCR-3
    name: "Candidate auditability (every proposed candidate names its source signal)"
    type: leading
    feature_origin: openlore-github-scraper
    persona: P-002
    target: "100% — every candidate traces to the exact public GitHub signal(s) that produced it"
    measurement_method: "release-gate acceptance test `candidate_names_source_signal` (SC-1 rendering + SD-1 @property: every CandidateClaim.source_signals is non-empty) + 5-user think-aloud at day-30"
    baseline_at_ga: "MET — SC-1 (release-gate) + SD-1 (@property, non-vacuous) GREEN as of slice-02 ship; a candidate with zero source signals is a bug, not a proposal"
    notes: "Leading indicator for the KPI-SCR-1 north star (users will not sign a candidate they cannot trace to a signal, so auditability is a precondition for fast signing). Day-30 think-aloud study owned by nw-product-owner."

  - id: KPI-SCR-4
    name: "Public-data-only (scraper never triggers a private read or surveillance affordance)"
    type: guardrail
    feature_origin: openlore-github-scraper
    persona: P-002
    target: "100% — zero private-endpoint calls; private/non-existent targets refused"
    measurement_method: "release-gate acceptance test `scraper_only_reads_public_data` (SG-5: FakeGithub seen_paths public-endpoint allowlist + private-target refusal) + DEVOPS Pact-style GitHub public-endpoint allowlist contract test (D-D22/D-D24)"
    baseline_at_ga: "MET — SG-5 GREEN as of slice-02 ship; adapter-github calls only public endpoints by construction (no private surface) and holds no storage/identity/pds reference"
    notes: "Guardrail / trust. Any private-data read or surveillance affordance violates the J-004 anxiety mitigation ('will this become a surveillance / blacklist tool?') — UNSHIPPABLE. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-SCR-5
    name: "Edit-rate (human-in-the-loop is real, not theatre)"
    type: leading
    feature_origin: openlore-github-scraper
    persona: P-002
    target: ">= 50% of signed-from-scraper claims show >= 1 field (predicate / evidence / confidence) edited from the proposed default"
    measurement_method: "author-side telemetry: per-signed-claim diff between the proposed candidate and the signed payload, emitted via tracing event `scrape.candidate.signed{target, predicate, fields_edited, proposed_confidence, signed_confidence}`"
    baseline_at_ga: "per-user instrumented (the edit path is GREEN — SS-1 edit-then-sign + the conservative 0.25 default that forces a conscious confidence-raise per WD-52); cohort = YELLOW — pending opt-in telemetry endpoint per DEVOPS D-D26"
    notes: "Leading indicator for KPI-SCR-1 (proves the human-in-the-loop is real, which is what makes users trust candidates enough to sign quickly). Disprover / kill criterion: < 20% edit-rate at day-30 suggests users rubber-stamp machine proposals — re-investigate whether candidates are over-confident or the edit affordance is too hidden."

  - id: KPI-GRAPH-1
    name: "Non-obvious connection surfaced (graph explorer north star)"
    type: north-star
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: ">= 60% of dogfood explorer sessions surface >= 1 non-obvious connection (a contributor spanning >= 2 candidate projects, or an unnoticed philosophy clustering) within 30 days"
    measurement_method: "author-side telemetry `graph.connection.surfaced` on traverse/weighted runs that yield a cross-project span + 30-day think-aloud study; behaviorally exercised by GQE-22 (--traverse Connections-found callout) and GQE-12/19 (multi-author / cross-project triangulation)"
    baseline_at_ga: "per-user instrumented (the surfacing path is GREEN — `--traverse` emits the cross-project 'Connections found' callout and `--weighted`/`--explain` surface triangulation); cohort = YELLOW pending opt-in telemetry endpoint (DEVOPS)"
    notes: "North star. Behavioral validation of J-002 — the slice's value evaporates if users CAN traverse/weight but never discover a non-obvious connection. Disprover: < 30% of sessions surface a connection at day-30."

  - id: KPI-GRAPH-2
    name: "Anti-merging in aggregates (zero attribution loss in any weighted/traversed result)"
    type: guardrail
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: "100% — every aggregate weight decomposes to per-author Contributions; zero faceless consensus rows"
    measurement_method: "release-gate acceptance `scoring_aggregate_preserves_attribution` (Gate 1, GQE-27) + GQE-13 (conflicting claims both contribute, mean never computed) + GQE-16/19 (--explain per-author decomposition); three-layer enforcement: non-Option author_did/claim_cid types + `xtask check-arch` scoring-feed/recursive-CTE SQL rule + behavioral"
    baseline_at_ga: "MET — GQE-13/16/19/27 GREEN as of slice-04 ship; aggregation happens in Rust (pure `scoring` core), never SQL (ADR-022 / WD-73)"
    notes: "Guardrail. Extends KPI-FED-1/2 (slice-03 attribution fidelity) into aggregates. Any faceless consensus weight is UNSHIPPABLE. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-GRAPH-3
    name: "Scoring transparency (every weight reproducible by hand from the formula)"
    type: guardrail
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: "100% — weight == documented no-ML formula applied to the displayed claims; reproducible via --explain"
    measurement_method: "property test `weight_equals_sum_of_subtotals` (scoring crate) + SC-1 (scoring_core) + GQE-16 (--explain running sum equals displayed weight) + day-30 'could you explain why this ranked first?' interview"
    baseline_at_ga: "MET — SC-1 + GQE-16 GREEN as of slice-04 ship; formula constants are the SSOT in `ScoringConfig::DEFAULT` (WD-77); `--explain` reuses the same pure-core output (single source of truth, no second formula). Mutation: 100% kill rate on the scoring formula (Phase 6)."
    baseline_notes: "no ML; the displayed number is the consumed number (KPI-4 inherited; no bucket-midpoint rounding — Gate 6 / GQE-26)"
    notes: "Guardrail / outcome. An irreproducible or ML-derived weight breaks the transparency promise — UNSHIPPABLE."

  - id: KPI-GRAPH-4
    name: "Sparse renders sparse (zero manufactured confidence from thin evidence)"
    type: guardrail
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: "100% — single-claim/single-author/no-span subgraphs render [SPARSE] + honesty line + lead-not-conclusion advice; 0 cases of confidence manufactured from thin evidence REGARDLESS of weight magnitude"
    measurement_method: "release-gate acceptance `sparse_renders_sparse` (GQE-11) + GQE-17 (--explain repeats the honesty line) + the `weight_bucket` breadth-guard boundary property (Phase 6 mutation-hardening, in-crate) + adversarial review of every weighted renderer"
    baseline_at_ga: "MET — GQE-11/17 GREEN as of slice-04 ship; the breadth guard (claim_count>1 || distinct_author_count>1 || cross_project_span>1) is LOAD-BEARING and 100% mutation-covered after Phase 6 boundary hardening — a high-confidence single opinion is never dressed up as [STRONG]"
    notes: "Guardrail. WD-74 epistemic honesty. Any manufactured confidence violates J-002 anxiety mitigation — UNSHIPPABLE. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-GRAPH-5
    name: "Referenced justification (a query result cited when justifying a real choice)"
    type: leading
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: ">= 1 referenced justification per dogfood explorer within 30 days"
    measurement_method: "30-day survey ('did you cite an openlore query when justifying a stack/community choice?') + qualitative session notes"
    baseline_at_ga: "YELLOW — the artifact exists (queryable, reproducible weighted/traverse output); cohort citation rate pending the day-30 survey (nw-product-owner)"
    notes: "Leading indicator for KPI-GRAPH-1 (proves the connection was decision-relevant, not just curious)."

  - id: KPI-GRAPH-6
    name: "Local-graph explore latency (query -> traverse -> weighted/explain under 5s)"
    type: leading
    feature_origin: openlore-scoring-graph
    persona: P-002
    target: "< 5 seconds end-to-end for a subgraph of <= 200 claims (local read; no network)"
    measurement_method: "author-side timing telemetry `graph.query.duration_seconds` histogram; local-first correctness exercised by GQE-15 (--weighted) + the --traverse network-disabled scenarios"
    baseline_at_ga: "per-user instrumented; local-first GREEN (GQE-15 + traversal network-disabled scenarios prove the full surface works with the network disabled — scoring/traversal read LOCAL stores only); cohort latency histogram pending telemetry endpoint"
    notes: "Leading indicator — friction kills exploration behavior. Inherits/reinforces KPI-5 (local-first)."

  # --- slice-05 (openlore-appview-search), recorded at finalize 2026-05-29 ---
  # Per WD-13 the umbrella sequence is federation -> scrapers -> scoring ->
  # appview; slice-05 is the FINAL slice (the network indexer / AppView).
  # Persona is P-002 (network-discovery hat) primary + P-001 (discovery hat)
  # secondary; recorded as P-002 to match the slice-03/04 block convention.

  - id: KPI-AV-1
    name: "Non-obvious-author discovery (network-discovery north star)"
    type: north-star
    feature_origin: openlore-appview-search
    persona: P-002
    target: ">=60% of dogfood discovery sessions surface >=1 relevant signed claim by an author the user does NOT already subscribe to, within 30 days"
    measurement_method: "author-side telemetry `search.discovery.unfollowed_author_hit{dimension, unfollowed_author_count}` when a result includes an unfollowed author the user inspects + 30-day think-aloud study; behaviorally exercised by AV-9/AV-15/AV-16 (network search returns unfollowed authors labeled '(not subscribed)') + AV-21 (the funnel affordance)"
    baseline_at_ga: "per-user instrumented (the surfacing path is GREEN — network search via the live indexer returns authors beyond the local graph, labeled '(not subscribed)', with a `peer add` affordance); cohort = YELLOW pending opt-in telemetry endpoint (DEVOPS). Implicit baseline is 0 (no network-discovery surface existed before slice-05; local query saw only own + subscribed peers)."
    notes: "North star. Behavioral validation of J-005 — the slice's value evaporates if users CAN search the network but never discover anything beyond what their local graph already showed. Disprover / kill criterion: < 20% unfollowed-author-discovery at day-30 forces an index-coverage / search-UX re-investigation before any web AppView."

  - id: KPI-AV-2
    name: "Anti-merging at network scale (zero attribution loss in any network search / aggregate / shared result)"
    type: guardrail
    feature_origin: openlore-appview-search
    persona: P-002
    target: "100% — every network search result row carries one author DID; identical-content-different-author renders as separate rows; zero faceless network-consensus rows anywhere"
    measurement_method: "release-gate acceptance test `network_result_preserves_attribution` (AV-9; every result row carries exactly one author DID; two identical-(subject,object) claims by different authors render as two rows; the index has no merged/consensus row; the --share boundary re-composes per-author) + adversarial review of every search/share renderer + the pure-core property AVC-2/AVC-5 (`compose_results` preserves every author) + 5-user think-aloud at day-30; THREE-layer enforcement: non-Option author_did types + `xtask check-arch` `no_cross_table_join_elides_author` extended to adapter-index-store SQL + behavioral"
    baseline_at_ga: "MET — AV-9 (release-gate) + AVC-2/AVC-5 GREEN as of slice-05 ship; aggregation (counts/groupings) happens in the PURE `appview-domain` core (Rust), NEVER SQL; the index has NO merged/consensus schema (the load-bearing absence, ADR-025)"
    notes: "Guardrail / cardinal. Extends KPI-FED-1/2 (slice-03) + KPI-GRAPH-2 (slice-04) anti-merging into NETWORK aggregates — the trust guarantee that distinguishes the OpenLore AppView from the centralized aggregators the product exists to replace. Any faceless network-consensus row is UNSHIPPABLE. CI alert if any run reports != 100% (release-blocking)."

  - id: KPI-AV-3
    name: "Signature-verified-before-index (zero unverified/unsigned/CID-mismatched claims indexed or returned)"
    type: guardrail
    feature_origin: openlore-appview-search
    persona: P-002
    target: "100% — no unverified / unsigned / CID-mismatched claim ever enters the index or is returned by a search; every result `[verified]` by construction"
    measurement_method: "release-gate adversarial fixture acceptance test `indexer_rejects_unverified_claim` (AV-3; tampered-signature + CID-mismatch + unsigned fixtures REJECTED before indexing, none entering the index nor any search result) + the universal `[verified]` marker test (AV-11) + the pure-core property AVC-1 (`ingest_decision` returns Index iff verify + CID both pass) + the real-z6Mk-decode gold test (AV-4); indexer-side counters `indexer.ingest.verified` vs `indexer.ingest.rejected{reason: bad_signature|cid_mismatch|unsigned}`"
    baseline_at_ga: "MET — AV-3 (release-gate) + AV-4 + AV-11 + AVC-1 GREEN as of slice-05 ship; the ingest gate reuses claim_domain::verify + compute_cid (NO second verification path, WD-104); `verified_against NOT NULL` makes 'every row verified' a schema invariant; production verification uses the REAL PLC z6Mk decode (the test seam is release-forbidden, ADR-026)"
