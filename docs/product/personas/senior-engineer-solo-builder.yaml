schema_version: 1

persona:
  id: P-001
  name: Senior Engineer Solo Builder
  short_name: Senior Engineer
  archetype: Jeff-class
  priority: P0
  primary: true

  one_liner: >
    A senior engineer building solo who treats philosophical alignment as a
    first-class engineering concern and wants tools that respect "claims, not truth."

  characteristics:
    role: Senior engineer (10+ years), often a tech lead in past lives.
    context: Building alone; choosing every tool deliberately; no committee.
    workflow: Lives in a terminal; comfortable with git, signed commits, CLIs, DIDs.
    values:
      - Local-first; data sovereignty is non-negotiable.
      - Philosophical rigor over tribal allegiance.
      - Reasoning trails over assertions of authority.
      - Federated > centralized for knowledge graphs.

  current_workarounds:
    - Long-form blog posts no one can structurally query.
    - GitHub stars as a crude "philosophy proxy" (which they hate).
    - Hand-curated personal awesome-lists in markdown.
    - Mental graph of "which contributors I trust on which topics."

  pains_today:
    - "I cannot point at WHY I trust a project's philosophy in a queryable way."
    - "My reasoning evaporates the moment I close the laptop."
    - "I have opinions I will not publish because they look like assertions of truth."
    - "I cannot easily see which contributors span the projects whose philosophies I share."

  triggers_for_openlore_use:
    - Evaluating a new dependency or framework for a side project.
    - Reading a contributor's blog post and wanting to anchor it as a claim.
    - Disagreeing with a popular take and wanting to publish a counter-claim
      without picking a fight on social media.

  primary_jobs: [J-001, J-002, J-003, J-004]
  walking_skeleton_jobs: [J-001]

  emotional_arc_starting_state: >
    Skeptical of yet-another-tool. Anxious that the framing will collapse into
    "truth assertion" if not handled carefully. Curious whether local-first +
    ATProto can really compose.

  ux_guardrails:
    - CLI-first; the UI is a deferrable layer.
    - One command per atomic action: `openlore claim add ...`, `openlore graph query ...`.
    - Output must be greppable text by default; `--json` opt-in.
    - Never silently mutate; surface every write with a checksum/CID.
    - Confidence display must NEVER read as "the system thinks this is true."

  # -------------------------------------------------------------------------
  # Counter-claim-reader hat (slice-11 / viewer-counter-claim-threads)
  # Added 2026-06-06 by Luna during DISCUSS for viewer-counter-claim-threads.
  # -------------------------------------------------------------------------
  hats:
    - id: counter-claim-reader
      activated_in_slice: slice-11 / viewer-counter-claim-threads
      one_liner: >
        P-001 wearing the counter-claim-reader hat is reading a claim in the
        read-only `openlore ui` browser viewer and wants to instantly see whether
        anyone has disagreed with it — and if so, who, with what CID, and exactly
        why (the verbatim reason) — WITHOUT the disagreement ever silently changing
        the claim she is reading. The VIEW half of J-003b; authoring stays the CLI.

      typical_session:
        - "Evaluating Rachel's claim that cargo embodies dependency-pinning (confidence 0.91)"
        - "Open http://127.0.0.1:<port>/claims/bafy...n4ka in the viewer"
        - "See a 'Countered' flag near the claim; beneath it a Counter-claims thread"
        - "Read Maria's own counter (bafy...new) and peer Tobias's counter (bafy...t0bi), each with its DID, CID, and verbatim reason"
        - "Note the claim's confidence is still 0.91 — the counters did not re-weight it"
        - "Click a counter's CID to drill into /claims/bafy...new (the counter's own detail)"
        - "Decide whether to trust, cite, or counter the claim herself — via the CLI `claim counter`"

      load_bearing_anxieties:
        - "Am I reading a claim someone has already refuted, and the viewer is hiding it from me?"
        - "Will the counter overwrite or re-weight the original, picking a winner for me?"
        - "Can I tell whose counter this is and read their actual reasoning, or just a faceless 'disputed' badge?"

      load_bearing_signals_of_success:
        - "The countered claim is clearly FLAGGED as disputed, AND its original confidence/text is untouched."
        - "Each counter shows its author DID, its own CID, and the full verbatim reason."
        - "An un-countered claim looks exactly like it does today — no empty 'no disagreement' noise."

      ux_guardrails_specific_to_counter_threads:
        - The viewer NEVER offers a counter/reply/dispute control; authoring stays EXCLUSIVELY in the CLI (read-only, I-VIEW-3).
        - The countered claim renders VERBATIM with its ORIGINAL confidence; counters never filter, merge, re-weight, or re-rank it (shown, never applied).
        - Every counter is attributed to its own author DID + CID with its verbatim reason; never a merged "disputed by N" or "consensus" aggregate.
        - The 'Countered' flag is a NEUTRAL presence marker, never a score, weight, count-verdict, or judgement.
        - The thread reads the LOCAL store only (own + pulled-peer counters); no network on this route; renders offline.

    # -------------------------------------------------------------------------
    # Counter-claim-scanner hat (slice-12 /claims list flag; EXTENDED in slice-13
    # to /peer-claims + /project + /philosophy edges).
    # Added 2026-06-07 by Luna during DISCUSS for viewer-counter-flags-graph-surfaces.
    # -------------------------------------------------------------------------
    - id: counter-claim-scanner
      activated_in_slice: slice-12 / viewer-counter-claim-list-flags
      extended_in_slice: slice-13 / viewer-counter-flags-graph-surfaces
      one_liner: >
        P-001 wearing the counter-claim-scanner hat is SCANNING a list-like viewer
        surface (her own /claims list in slice-12; her federated /peer-claims list and
        her /project + /philosophy traversal edges in slice-13) and wants to instantly
        spot WHICH claims/edges have drawn disagreement — so she can triage where to
        spend her attention — WITHOUT the flag ever changing the surface's order,
        grouping, paging, counts, weights, or the flagged row/edge's data. The
        at-a-glance facet of the VIEW half of J-003b; authoring stays the CLI.

      surfaces:
        - "/claims own-claims list (slice-12)"
        - "/peer-claims federated list (slice-13)"
        - "/project + /philosophy traversal edges (slice-13)"

      typical_session:
        - "Scanning /peer-claims to decide which peers' reasoning to engage with"
        - "Spot a 'Countered' marker on Tobias's cargo/dependency-pinning row (bafy...t0bi, 0.88)"
        - "Note the peer-origin column and the 0.88 confidence are unchanged — the flag moved nothing"
        - "Switch to /project?subject=github:rust-lang/cargo and spot a contested edge in the dependency-pinning group"
        - "Note the grouping, edge order, and contributor list are byte-identical to before the flag existed"
        - "Click a flag to drill into /claims/{cid} (the slice-11 thread) and read the actual disagreement"
        - "Decide whether to trust, cite, or counter the claim herself — via the CLI 'claim counter'"

      load_bearing_anxieties:
        - "Do I have to open every peer claim / every edge one-by-one to find which are countered?"
        - "Will a 'Countered' tag silently re-sort, re-group, filter, or push contested rows/edges around — picking a triage order or a path for me?"
        - "Is this flag a VERDICT ('disputed'/'refuted'/'false'), or just a neutral 'someone responded here' marker — and on a graph edge, does it change the edge's confidence or its place in the survey?"

      load_bearing_signals_of_success:
        - "I can see at a glance, on the peer list and on each traversal edge, which are countered — and the flag links me straight to that claim's thread."
        - "A peer claim / edge with no counter looks EXACTLY like it does today — no badge, no noise."
        - "The peer-list order, the traversal grouping + edge order, the contributor list, and every confidence/bucket are byte-identical to before the flag existed."

      ux_guardrails_specific_to_scanner:
        - The flag is the SAME neutral 'Countered' presence marker on every surface (the slice-11/12 COUNTERED_PRESENCE_FLAG); never a count, verdict, weight, or score.
        - The flag NEVER re-orders/re-ranks/filters/re-weights/re-groups/re-paginates any surface; the flagged row/edge renders verbatim in its original position (shown, never applied).
        - A row/edge countered by N authors shows ONE neutral marker (presence-only); the per-counter attribution lives in the slice-11 thread the flag links to.
        - The presence read is the SAME slice-12 batch read (counter_presence_for) — ONE aggregate query per render (no N+1); LOCAL + offline; no per-row artifact read; no new read method.
        - On /score the flag is DEFERRED (slice-14) precisely because a flag beside a weight risks a 'does being countered lower the weight?' misread; the scanner hat does NOT yet extend to /score.

    # -------------------------------------------------------------------------
    # Publisher/sharer hat (serverless-philosophy-federation).
    # Added 2026-07-13 by Luna during DISCUSS for serverless-philosophy-federation.
    # The NEW social/shareable dimension for the otherwise CLI-first, private P-001.
    # -------------------------------------------------------------------------
    - id: publisher-sharer
      activated_in_slice: serverless-philosophy-federation (slices 01, 04)
      one_liner: >
        P-001 wearing the publisher/sharer hat has deployed their OWN serverless (Cloudflare)
        instance from the `atproto/` code, pushed their locally-signed claims to it, and wants a
        clean PUBLIC, read-only philosophy card — at a stable URL they OWN — that they can link from
        their Bluesky profile. It is the first time this private, CLI-first, local-first persona gets
        an intentional PUBLIC identity surface, and the load-bearing tension is doing so WITHOUT
        surrendering sovereignty to a central authority (the instance is theirs; no shared operator).

      typical_session:
        - "Deploy my own instance: `wrangler deploy` the atproto/ Worker; register it with `openlore publish init https://openlore.maria.workers.dev`"
        - "Push my graph: `openlore publish push` — my local signed claims now mirror on MY instance"
        - "Open https://openlore.maria.workers.dev/ — my philosophy card renders my attributed claims, read-only"
        - "Paste that URL into my Bluesky profile bio as my reasoning trail"
        - "Confirm my local DuckDB is untouched — publishing was additive, source of truth stayed local"

      load_bearing_anxieties:
        - "Does hosting on Cloudflare make this a central authority — the exact thing openlore exists to avoid?"
        - "Will publishing overwrite or diverge from my local source of truth?"
        - "Will the public card expose claims I did not explicitly choose to publish?"

      load_bearing_signals_of_success:
        - "The instance is unambiguously MINE — I deployed it, I own the data, no shared operator is in the trust path."
        - "The card is read-only and renders ONLY what I pushed, each claim attributed to my author DID."
        - "My local store is the source of truth and is never mutated by a push or a card render."

      ux_guardrails_specific_to_publisher_sharer:
        - Self-hosted serverless ONLY: the instance is the user's OWN Cloudflare deploy; NO central/community-operated service (the ADR-023 reconciliation).
        - The public card is READ-ONLY: it holds no signing key, authors/mutates nothing, and renders only explicitly-pushed claims (mirrors the ADR-023 signing-incapable-by-construction boundary).
        - Publishing is ADDITIVE + CID-verified: the local DuckDB stays the source of truth; a push/pull never silently overwrites a local claim (KPI-SF-1 round-trip integrity).
        - Local-first preserved (KPI-5): compose/sign/local `graph query` never depend on the instance being reachable.
        - Anti-merging carries onto the card and cross-instance reads: every rendered claim shows its author DID; no "consensus" row, ever.
        - The instance URL is just the ADR-027 configurable URL (`https://openlore.<me>.workers.dev` in place of `http://127.0.0.1:<port>`) — a purely additive transport, not a new contract.
