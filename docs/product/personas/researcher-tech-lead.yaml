schema_version: 1

persona:
  id: P-002
  name: Researcher / Tech Lead (Consumer)
  short_name: Researcher
  archetype: read-mostly
  priority: P1
  primary: false

  one_liner: >
    A researcher or tech lead who wants to consume the OpenLore graph to inform
    decisions, but is unlikely to author claims in the first 6 months.

  characteristics:
    role: Researcher, tech lead, or staff engineer choosing tools for a team.
    context: Reads other people's signed claims; rarely publishes their own.
    workflow: Mix of CLI + web; comfortable subscribing to feeds.
    values:
      - Evidence-backed > popularity-based recommendations.
      - Attribution preserved when citing other developers' reasoning.

  current_workarounds:
    - Following respected people on Mastodon/GitHub.
    - Reading curated awesome-lists with no provenance.
    - Asking trusted peers in private DMs.

  pains_today:
    - "I cannot easily weight someone's opinion by their actual track record."
    - "Aggregator sites collapse provenance."

  triggers_for_openlore_use:
    - Choosing a library or framework for a team.
    - Writing an architecture decision record that needs grounded references.

  primary_jobs: [J-002, J-003, J-004]
  walking_skeleton_jobs: []                            # not in slice-01 walking skeleton
  walking_skeleton_jobs_for_slice_03: [J-003]          # IS the walking skeleton for slice-03
  walking_skeleton_jobs_for_slice_04: [J-002]          # IS the walking skeleton for slice-04 (scoring-graph)

  emotional_arc_starting_state: >
    Pragmatic. Will not adopt unless the read experience is faster than
    "skim five blog posts + a HN thread."

  ux_guardrails:
    - Query must produce useful output even when the local graph is sparse.
    - Attribution always visible; no "merged consensus" framing.
    - Friction to author a claim must be visible but not punishing — make it
      easy to graduate from reader to author when ready.
    - Subscription is reversible without residue (slice-03 J-003c).
    - Counter-claim authoring (slice-03 J-003b) must feel as light as the
      `git commit -m` of disagreement; no modal "are you sure you want to
      disagree?" friction.

  # -------------------------------------------------------------------------
  # Federation-reader hat (slice-03 / openlore-federated-read)
  # Added 2026-05-27 by Luna during DISCUSS for openlore-federated-read.
  # -------------------------------------------------------------------------
  hats:
    - id: federation-reader
      activated_in_slice: slice-03 / openlore-federated-read
      one_liner: >
        P-002 wearing the federation-reader hat is consuming OTHER developers'
        signed claims to inform a decision, and occasionally publishing a
        counter-claim when they disagree strongly enough to stake a position.

      typical_session:
        - "Heard a respected developer (did:plc:rachel-test) has interesting takes on Rust ecosystem"
        - "Run `openlore peer add did:plc:rachel-test`"
        - "Run `openlore peer pull` to ingest their claims"
        - "Run `openlore graph query --subject github:rust-lang/cargo --federated`"
        - "See Rachel's claims alongside mine, with explicit attribution per claim"
        - "Disagree with one of Rachel's claims; run `openlore claim counter <cid> --reason ...`"
        - "Optional: weeks later, decide Rachel's claim stream isn't worth following; run `openlore peer remove did:plc:rachel-test --purge`"

      load_bearing_anxieties:
        - "If I subscribe to a bad-actor, do they pollute my view permanently?"
        - "If I post a counter-claim against someone with more followers, am I starting a brigade war?"
        - "If I unsubscribe, is the data truly gone from my disk?"

      load_bearing_signals_of_success:
        - "Federated query shows BOTH my claims and the peer's, each with author DID and confidence, never as a single merged consensus row."
        - "Counter-claim publishes via the same `claim add` pipeline I already know."
        - "`peer remove --purge` followed by `graph query --federated` returns my claims only — peer claims gone."

      ux_guardrails_specific_to_federation:
        - Author DID is the FIRST field shown for every peer claim (not the last).
        - The `graph query --federated` output groups by author, NOT by subject, NOT by an aggregate score.
        - `peer add` is acknowledged with a clear message naming the DID added and the timestamp of next pull.
        - `peer remove` defaults to soft (removes subscription but keeps claims cached) — `--purge` is explicit and irreversible. (Both behaviors discoverable from `peer remove --help`.)
        - Counter-claim CLI is `openlore claim counter <peer_cid> --reason ...`; the underlying record uses the existing `references[]` mechanism from ADR-008 with `type: counters`.

    # -------------------------------------------------------------------------
    # Contributor-evaluator hat (slice-02 / openlore-github-scraper)
    # Added 2026-05-28 by Luna during DISCUSS for openlore-github-scraper.
    # -------------------------------------------------------------------------
    - id: contributor-evaluator
      activated_in_slice: slice-02 / openlore-github-scraper
      one_liner: >
        P-002 wearing the contributor-evaluator hat is sizing up a contributor
        or repo through a philosophy lens (for hiring, collaboration, or
        dependency vetting) and wants the tool to lower the cost of producing
        well-evidenced claims WITHOUT ever asserting anything on their behalf.

      typical_session:
        - "Evaluating whether to adopt rust-lang/cargo patterns for the team"
        - "Run `openlore scrape github rust-lang/cargo`"
        - "Read the public-data-only banner; see 5 candidate claims, each naming its source signal, all at 0.25 speculative"
        - "Run `openlore scrape github rust-lang/cargo --sign 1` to carry one candidate into the slice-01 compose preview"
        - "Edit the predicate/evidence, raise confidence from 0.25 to 0.55, add a note, sign, publish"
        - "Optional: `--sign 1,3,4` to capture several claims in one pass, signing each individually"
        - "Optional later: set GITHUB_TOKEN to scrape a busy contributor (torvalds) without hitting the anon rate limit"

      load_bearing_anxieties:
        - "Is this a surveillance tool? Will it read private data or build a blacklist?"
        - "Will the tool put words in my mouth by signing claims on my behalf?"
        - "Will the candidates be over-confident, tempting me to rubber-stamp machine proposals?"

      load_bearing_signals_of_success:
        - "A banner up front states only PUBLIC data is read and nothing is published; private/non-existent targets are refused."
        - "NOTHING is signed until I carry a candidate through the slice-01 compose preview I already know (with 'not as truth') and sign it myself."
        - "Every candidate names the exact public signal that produced it, so I can audit and reject any derivation."
        - "I produce an evidence-backed claim in under 2 minutes instead of 20 minutes of tab-juggling."

      ux_guardrails_specific_to_scraper:
        - The public-data-only banner is printed BEFORE any harvest begins.
        - Candidates render with the source signal FIRST and a conservative 0.25 (speculative) confidence; the tool never proposes above 0.3.
        - There is NO auto-sign and NO "sign all without review"; `--sign` walks each candidate through an individual compose preview requiring the human's signing gesture.
        - `scrape github` without `--sign` writes zero claims and makes zero PDS writes (the human-gate is observable).
        - The signal->predicate mapping is small and auditable (SSOT in jobs.yaml); no ML inference that would make candidates unauditable.
        - The optional GITHUB_TOKEN is never logged, never written to a claim, never published.

    # -------------------------------------------------------------------------
    # Graph-explorer hat (slice-04 / openlore-scoring-graph)
    # Added 2026-05-28 by Luna during DISCUSS for openlore-scoring-graph.
    # -------------------------------------------------------------------------
    - id: graph-explorer
      activated_in_slice: slice-04 / openlore-scoring-graph
      one_liner: >
        P-002 wearing the graph-explorer hat is querying the LOCAL federated
        graph (own + pulled peers + scraper-signed claims) by subject, object,
        and contributor, traversing its edges, and reading transparent adherence
        weights to make a tech/community decision defensible to a team — without
        being misled by sparse or speculative data.

      typical_session:
        - "Must justify a stack choice to the team by Friday; cares about dependency-pinning as a philosophy"
        - "Run `openlore graph query --object org.openlore.philosophy.dependency-pinning` to see which projects embody it, by author"
        - "Run `openlore graph query --contributor did:plc:rachel-test` to read one peer's whole reasoning trail"
        - "Run `... --object dependency-pinning --traverse` and spot a peer who spans 2 of the candidate projects (the 'aha')"
        - "Run `... --weighted` to rank candidates by a transparent adherence weight; a single-claim philosophy is labeled [SPARSE]"
        - "Run `... --weighted --explain github:denoland/deno` to reproduce one project's weight by hand for the team write-up"

      load_bearing_anxieties:
        - "What if the graph is sparse, biased toward popular projects, or full of speculative claims and I make a bad call?"
        - "What if the score is an opaque number I cannot defend to a skeptical teammate?"
        - "What if a weighted view silently merges authors into a faceless consensus, like the aggregators I distrust?"

      load_bearing_signals_of_success:
        - "I surface a non-obvious cross-project contributor connection in a single query."
        - "Every weight is shown with its inputs and formula, and `--explain` lets me reproduce it by hand — no ML black box."
        - "A thin subgraph is labeled [SPARSE] with 'based on 1 claim by 1 author', so I treat it as a lead, not a conclusion."
        - "Every weighted/traversed result decomposes to per-author, per-cid claims — never a merged consensus row."

      ux_guardrails_specific_to_scoring:
        - Scoring is READ/VIEW only; no command in this hat creates, signs, or publishes a claim, and none requires the network.
        - Every adherence weight is displayed WITH its inputs and the formula; the formula is small, closed-form, and explicitly states "no ML".
        - Weights and weight buckets ([STRONG]/[MODERATE]/[SPARSE]) are DERIVED + DISPLAY-ONLY; never persisted, signed, or published (extends WD-10).
        - A sparse subgraph renders honestly as [SPARSE] with a "based on N claims by M authors" line; confidence is never manufactured from thin evidence.
        - Every weighted/traversed aggregate retains per-author attribution and decomposes via `--explain`; no "consensus weight" is shown without the contributing authors visible.
        - Traversal walks existing claims only; every edge maps to exactly one signed claim and is bounded by depth (default 2) to prevent fan-out explosion.

    # -------------------------------------------------------------------------
    # Network-discovery hat (slice-05 / openlore-appview-search)
    # Added 2026-05-28 by Luna during DISCUSS for openlore-appview-search.
    # -------------------------------------------------------------------------
    - id: network-discovery
      activated_in_slice: slice-05 / openlore-appview-search
      one_liner: >
        P-002 wearing the network-discovery hat is searching an index of many
        authors' PUBLIC signed claims from ACROSS the network — by philosophy,
        project, or contributor — to discover well-evidenced reasoning and the
        people behind it WITHOUT already knowing whose DID to follow, then
        subscribing to a discovered author to grow their trusted local graph.

      typical_session:
        - "Cares about reproducible-builds but does not yet follow anyone who claims it"
        - "Run `openlore search --object org.openlore.philosophy.reproducible-builds` to search the network index, not just the local graph"
        - "See results from authors never subscribed to, each with author DID, confidence, evidence, and a verified-signature marker"
        - "Inspect one result; confirm the signature is verified and the CID matches what the author published"
        - "Run `openlore search --contributor github:rachel` to read a discovered author's whole public reasoning trail"
        - "Run `openlore peer add did:plc:rachel-test` straight from the discovery result to start following them (discovery -> federation)"
        - "Optional: share the query result as a link a teammate can open and see the same attributed, verified claims"

      load_bearing_anxieties:
        - "Is this AppView just another centralized aggregator that collapses provenance, like the HN/Reddit/awesome-lists I distrust?"
        - "Will the index serve me a tampered or fabricated claim that the author never actually signed?"
        - "Does adding a network search service quietly betray the local-first promise I bought into?"
        - "By publishing my claims, did I expose data I did not realize would be network-discoverable?"

      load_bearing_signals_of_success:
        - "I discover a relevant signed claim by an author I had never subscribed to, in my first network search."
        - "Every discovered result shows its author DID and a verified-signature marker; no 'the network says X' consensus row ever hides the individual authors."
        - "I subscribe to a newly-discovered author in one step, and their claims then flow into my local graph via the slice-03 federation path I already know."
        - "My compose / sign / own-claim flows still work with the network disabled; the AppView is clearly a read-only discovery surface, not a new authority."
        - "A banner makes the 'indexing aggregates only PUBLIC signed claims' expectation explicit, so I am never surprised by what is discoverable."

      ux_guardrails_specific_to_appview:
        - The AppView is a READ/discovery surface only; no `search` command creates, signs, publishes, or mutates a claim, and the local store remains the source of truth.
        - Every search result shows the author DID FIRST and a verified-signature marker; results are grouped by author (or by subject under an author), NEVER as a faceless "network consensus" row (anti-merging carried into network aggregates).
        - No claim enters the index until its signature is verified and its CID recomputed (mirrors slice-03 pull-time verification); an unverified claim is never searchable.
        - Indexing aggregates ONLY public signed claims; a "your peer-published claims are public" expectation is surfaced honestly (the ADR-014-deferred framing).
        - A discovered author drops straight into `openlore peer add` (no parallel subscription path); discovery is a front-door to the slice-03 federation flow.
        - When the index is unreachable, `search` degrades to a clear local-only / unavailable message; it never blocks the local-first compose/sign/query flows.
        - Confidence display still NEVER reads as "the system thinks this is true" (inherited P-001/P-002 guardrail); a network search result is still one author's claim, not truth.
