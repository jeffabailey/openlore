# environments.yaml — github-release-binaries (DEVOPS)
# Machine artifact per the nWave DEVOPS environment schema.
# Source of truth for release.yml's build matrix + coexistence guarantees.
# Governs: ADR-011 (release matrix + tarball naming), ADR-012 (supply-chain).
# Consumed by: homebrew-binary-distribution (formula reads tarball names + .sha256).

feature: github-release-binaries
wave: DEVOPS
date: "2026-07-12"
architect: Apex (nw-platform-architect)
workflow_file: .github/workflows/release.yml   # greenfield — does not exist yet
trigger:
  on: "push.tags: ['v*']"                       # tags only; never per-PR/per-push
  version_derivation: "strip leading 'v' (v0.1.0 -> 0.1.0)"
  version_assertion: "tag-version MUST equal cli crate Cargo version, else fail build-release"
concurrency:
  group: "release-${{ github.ref }}"
  cancel_in_progress: false                     # never cancel a half-published release
permissions:
  contents: write         # create Release + upload assets
  id-token: write         # GitHub OIDC: cosign keyless signing + SLSA attestation
  attestations: write     # record build-provenance attestations

# ---------------------------------------------------------------------------
# The 4 native build targets (ADR-011 LOCKED matrix). No cross-compile.
# Each emits openlore-{version}-{triple}.tar.gz + .tar.gz.sha256, then downstream
# cosign .sig + .cert per tarball (release-wide sbom.cdx.json is separate).
# ---------------------------------------------------------------------------
target_environments:
  - name: macos-arm64
    triple: aarch64-apple-darwin
    runner: macos-14
    os: macos
    arch: aarch64
    linker: system
    build_command: "cargo build --release -p cli --bin openlore"
    artifact: "openlore-{version}-aarch64-apple-darwin.tar.gz"
    companions: [".sha256", ".sig", ".cert"]
    native: true
    preconditions: ["rust-toolchain@stable", "Swatinem/rust-cache@v2", "Cargo.lock committed"]
    fallback: none
    risk: low

  - name: macos-x86_64
    triple: x86_64-apple-darwin
    runner: macos-13
    os: macos
    arch: x86_64
    linker: system
    build_command: "cargo build --release -p cli --bin openlore"
    artifact: "openlore-{version}-x86_64-apple-darwin.tar.gz"
    companions: [".sha256", ".sig", ".cert"]
    native: true
    preconditions: ["rust-toolchain@stable", "Swatinem/rust-cache@v2", "Cargo.lock committed"]
    fallback: none
    risk: medium
    risk_note: "macos-13 is the last Intel-hosted macOS image; track GitHub deprecation."

  - name: linux-x86_64
    triple: x86_64-unknown-linux-gnu
    runner: ubuntu-latest
    os: linux
    arch: x86_64
    linker: glibc
    build_command: "cargo build --release -p cli --bin openlore"
    artifact: "openlore-{version}-x86_64-unknown-linux-gnu.tar.gz"
    companions: [".sha256", ".sig", ".cert"]
    native: true
    preconditions: ["rust-toolchain@stable", "Swatinem/rust-cache@v2", "Cargo.lock committed"]
    fallback: none
    risk: low

  - name: linux-arm64
    triple: aarch64-unknown-linux-gnu
    runner: ubuntu-24.04-arm
    os: linux
    arch: aarch64
    linker: glibc
    build_command: "cargo build --release -p cli --bin openlore"
    artifact: "openlore-{version}-aarch64-unknown-linux-gnu.tar.gz"
    companions: [".sha256", ".sig", ".cert"]
    native: true
    preconditions: ["rust-toolchain@stable", "Swatinem/rust-cache@v2", "Cargo.lock committed",
                    "GitHub-hosted arm64 Linux runner schedulable (free for public repos)"]
    risk: high
    risk_note: >
      GitHub-hosted arm64 Linux runner. GA + free for public repos, but availability
      depends on account/runner-group policy. If unschedulable, use fallback (relaxes
      ADR-011 no-cross-compile for this one cell — note in release notes).
    fallback:
      preference_order:
        - "cargo-zigbuild / cross from ubuntu-latest (cross-compile aarch64-unknown-linux-gnu)"
        - "QEMU emulation (docker/setup-qemu-action + arm64 container; ~5-10x slower)"
        - "self-hosted arm64 runner (last resort; adds custody/maintenance burden)"

# ---------------------------------------------------------------------------
# Supply-chain artifacts produced once per release (ADR-012). Release-wide, not
# per-triple, except cosign which signs each tarball.
# ---------------------------------------------------------------------------
supply_chain_artifacts:
  cosign:
    mode: keyless
    installer: sigstore/cosign-installer
    auth: github-oidc          # no long-lived keys (ADR-012)
    outputs: [".sig", ".cert"] # per tarball
    anchor: rekor-transparency-log
  sbom:
    format: cyclonedx
    tool: cargo-cyclonedx      # CycloneDX/cyclonedx-rust-cargo, pinned via taiki-e/install-action@v2
    output: sbom.cdx.json      # release-wide
    source: "committed Cargo.lock (same as binaries built against)"
  provenance:
    action: actions/attest-build-provenance
    slsa_target: L3
    slsa_acceptable: L2
    subjects: "the 4 tarballs"

# ---------------------------------------------------------------------------
# Publish: what lands on the GitHub Release for the tag.
# ---------------------------------------------------------------------------
publish:
  target: github-releases
  tool: "softprops/action-gh-release (or gh release)"
  assets:
    - "4x openlore-{version}-{triple}.tar.gz"
    - "4x .sha256"
    - "4x .sig"
    - "4x .cert"
    - "sbom.cdx.json"
    - "CHANGELOG excerpt"
  changelog_source: "annotated tag message (recommended; no CHANGELOG.md exists yet)"
  release_body_embeds: "ADR-012 consumer verify commands (sha256 -c, cosign verify-blob, cyclonedx analyze)"

# ---------------------------------------------------------------------------
# platform_coverage — what the 4-triple matrix reaches (ADR-011).
# ---------------------------------------------------------------------------
platform_coverage:
  covered:
    - "macOS Apple Silicon (aarch64-apple-darwin)"
    - "macOS Intel (x86_64-apple-darwin)"
    - "Linux x86_64 glibc (x86_64-unknown-linux-gnu)"
    - "Linux aarch64 glibc — RPi 4/5, Graviton (aarch64-unknown-linux-gnu)"
  addressable_persona_pct: ">95% (macOS + Linux developers, per ADR-011)"
  deferred:
    - target: x86_64-pc-windows-msvc
      reason: "Windows out of scope; revisit at >=3 GitHub issue requests (ADR-011)."
    - target: x86_64-unknown-linux-musl
      reason: "keyring/DBus static-link complications; WSL2 fallback covers musl users (ADR-011)."
  install_paths:
    in_scope: ["GitHub Releases tarball download (+ cosign verify)"]
    deferred: ["cargo install openlore (crates.io — needs CRATES_IO_TOKEN)", "Homebrew tap (homebrew-binary-distribution)"]

# ---------------------------------------------------------------------------
# coexistence_matrix — release.yml is purely additive; existing workflows unchanged.
# ---------------------------------------------------------------------------
coexistence_matrix:
  - workflow: .github/workflows/ci.yml
    triggers: ["pull_request", "push: [main]"]
    status: unchanged
    overlap_with_release: none          # disjoint triggers
    shared: ["conventions: checkout@v4, rust-toolchain@stable, rust-cache@v2, install-action@v2, nextest --test-threads=1", "deny.toml (read-only)"]
    relationship: "release.yml verify job re-runs ci.yml's commit+acceptance gates on the tagged ref"
  - workflow: .github/workflows/nightly.yml
    triggers: ["schedule: cron 0 8 * * *", "workflow_dispatch"]
    status: unchanged
    overlap_with_release: none          # disjoint triggers
    shared: ["conventions", "cargo-mutants tooling (release does NOT run mutation — deferred)"]
    relationship: "additive; release.yml does not touch nightly mutation"
  - workflow: .github/workflows/release.yml
    triggers: ["push: tags: ['v*']"]
    status: new
    overlap_with_release: self
    relationship: "the greenfield workflow this feature designs"

# ---------------------------------------------------------------------------
# deployment_assumptions — invariants release.yml MUST uphold.
# ---------------------------------------------------------------------------
deployment_assumptions:
  - id: DA-1
    text: "Release is idempotent per tag: re-running a tag must not double-publish assets."
  - id: DA-2
    text: "Build is deterministic-from-tag: binaries built from the tagged commit against committed Cargo.lock, not a fresh resolve."
  - id: DA-3
    text: "No partial publish: publish is the last job; contents:write is not exercised until verify + build + sign all pass."
  - id: DA-4
    text: "Immutable artifacts: a published tag is never mutated; withdraw-and-recut (delete Release+tag, fix forward, new patch tag) is the rollback."
  - id: DA-5
    text: "Version integrity: tag-version == cli Cargo version is asserted in build-release; mismatch fails the release."
  - id: DA-6
    text: "First-party / OIDC only: no long-lived secrets in v1 (cosign keyless, SLSA via OIDC); CRATES_IO_TOKEN-requiring crates.io publish is deferred."
  - id: DA-7
    text: "fail-fast:false on the build matrix — one platform's failure does not silently drop the others; all 4 must succeed for publish."

# ---------------------------------------------------------------------------
# Deferred gates (ci-cd-pipeline.md §7.1 heavy set) — documented, NOT built here.
# ---------------------------------------------------------------------------
deferred_gates:
  - gate: "full cargo mutants sweep (release-blocking)"
    reason: "only nightly.yml runs mutation (advisory); release-blocking job unbuilt"
    future_slice: mutation-release-gate
  - gate: "8-cell substrate gold-matrix"
    reason: "substrate-matrix.md is a doc; no runnable gate exists"
    future_slice: substrate-gold-matrix-gate
  - gate: "Pact vs real bsky.social (PACT_REAL_PDS=1)"
    reason: "manual-approval real-PDS replay unbuilt"
    future_slice: pact-real-pds-release-gate
  - gate: "crates.io publish (cargo publish)"
    reason: "needs CRATES_IO_TOKEN custody; OIDC-only v1"
    future_slice: cratesio-publish

# ---------------------------------------------------------------------------
# extension_points — reserved DAG slots for future features.
# ---------------------------------------------------------------------------
extension_points:
  - id: OD-HB-2
    feature: homebrew-binary-distribution
    job: bump-formula
    needs: [publish]
    note: "reads published *.sha256 to update the tap formula; placeholder comment in release.yml"
