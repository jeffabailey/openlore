schema_version: 1

journey:
  name: "At-a-glance counter flags on the claims list"
  goal: "Spot which of my own claims have drawn a counter while scanning the /claims list, then drill into the contested claim's thread"
  persona: "P-001 (Maria, node operator, counter-claim-scanner hat)"
  job_id: J-003b
  feature: viewer-counter-claim-list-flags
  slice: slice-12

  emotional_arc:
    start: "Mild unease — did anyone push back on my claims, and do I have to open each one to find out?"
    middle: "Oriented relief — scanning the list, contested rows are visibly flagged; no surprise ambush"
    end: "Confident, un-ambushed — I triaged which thread to read; the list stayed honest and un-reordered"

steps:
  - id: 1
    name: "Scan the claims list"
    command: "GET /claims  (open http://127.0.0.1:<port>/claims)"

    tui_mockup: |
      +-- My Claims ------------------------------------------------+
      | Subject              Predicate    Object    Conf  CID       |
      | github:…/cargo       embodies…    memory-…  0.90  bafyM…  [Countered]
      | github:…/docs-tool   embodies…    doc-first 0.90  bafyM…           |
      | github:…/semver-lib  embodies…    semver    0.30  bafyM…  [Countered]
      | 1–3 of 3                                                    |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "countered_cid_set"
        source: "counter_presence_for(&[cid]) over claim_references ∪ peer_claim_references (LOCAL, indexed)"
        displayed_as: "${COUNTERED_PRESENCE_FLAG} per countered row"
        consumers: ["render_claim_row (the per-row marker)", "the slice-11 /claims/{cid} thread (link target)"]
      - name: "COUNTERED_PRESENCE_FLAG"
        source: "viewer-domain::COUNTERED_PRESENCE_FLAG = \"Countered\" (slice-11, reused verbatim)"
        displayed_as: "the neutral marker text"
        consumers: ["slice-11 detail render_presence_flag", "slice-12 render_claim_row (this slice)"]

    emotional_state:
      entry: "Slightly blind — the list today shows no disagreement signal"
      exit: "Oriented — I can see which rows are contested without opening them"

    integration_checkpoint: |
      list_claims' ordering (composed_at DESC, cid), paging, and total count MUST be
      byte-identical with and without the flag. The presence set is mapped onto rows
      AFTER list_claims; the flag SQL is a separate single aggregate query (no N+1),
      and never a WHERE/ORDER BY/GROUP BY on the list query.

    failure_modes:
      - "Presence read issues one query per row (N+1) instead of one batch query"
      - "Flag re-orders/re-ranks/filters the list (shown-never-applied violation)"
      - "Flag shows a count or 'disputed by N' instead of neutral presence (anti-merging violation)"
      - "Un-countered row shows empty-state noise ('0 counters') instead of nothing"
      - "Flag reads as a verdict ('disputed'/'refuted'/'false')"

    gherkin: |
      Scenario: A countered claim's list row shows the neutral Countered marker
        Given Maria's store holds her claim "bafyMariaRust" countered by Tobias
        When Maria opens GET /claims
        Then the "bafyMariaRust" row shows the "Countered" marker
        And the marker text is exactly "Countered"
        And shared artifact "${COUNTERED_PRESENCE_FLAG}" matches its single source

      Scenario: An un-countered claim's row shows no marker and no noise
        Given Maria's store holds her un-countered claim "bafyMariaDoc"
        When Maria opens GET /claims
        Then the "bafyMariaDoc" row shows no "Countered" marker and no empty-state text

      Scenario: The presence lookup is one aggregate query regardless of page size
        Given Maria's store holds a full 50-claim /claims page
        When Maria opens GET /claims
        Then exactly one counter-presence query runs for the whole page

  - id: 2
    name: "Drill into the contested claim's thread"
    command: "GET /claims/{cid}  (follow the [Countered] link)"

    tui_mockup: |
      +-- Claim detail (slice-11) ---------------------------------+
      | github:rust-lang/cargo  embodiesPhilosophy  memory-safety  |
      | confidence 0.90   author did:plc:maria   CID bafyMariaRust |
      | [Countered]                                                |
      | Counter-claims                                             |
      |  - did:plc:tobias (bafyTobias…): "cargo allows unsafe in…" |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "claim_cid"
        source: "ClaimRow.cid (from list_claims) == the /claims/{cid} path segment"
        displayed_as: "the [Countered] link href /claims/{cid}"
        consumers: ["slice-11 query_counter_claims(target_cid)", "the detail thread render"]

    emotional_state:
      entry: "Curious — who countered this, and why?"
      exit: "Engaged, in control — I chose this thread; I read the verbatim attributed reasons"

    integration_checkpoint: |
      The list flag's link target CID MUST equal the detail route's CID, so the
      one-hop drill lands on the slice-11 thread for the SAME claim. No new render —
      this step reuses the existing slice-11 detail page unchanged.

    failure_modes:
      - "The [Countered] link points to a different CID than the row's claim"
      - "The link opens a compose/counter form (authoring leak — forbidden)"

    gherkin: |
      Scenario: The Countered marker links to that claim's thread
        Given Maria's store holds her claim "bafyMariaRust" countered by Tobias
        When Maria opens GET /claims and follows the "Countered" marker
        Then she lands on /claims/bafyMariaRust
        And she sees the slice-11 counter thread for that claim
        And no compose/counter control is offered (read-only)

integration_validation:
  shared_artifact_consistency:
    - artifact: "COUNTERED_PRESENCE_FLAG"
      must_match_across: [1]
      failure_message: "The list flag text must be the slice-11 COUNTERED_PRESENCE_FLAG constant, not a new string — drift breaks the single-source neutral-marker contract."
    - artifact: "claim_cid"
      must_match_across: [1, 2]
      failure_message: "The list flag's link CID must equal the detail route CID, or the one-hop drill lands on the wrong claim."
    - artifact: "list ordering/paging/count"
      must_match_across: [1]
      failure_message: "list_claims ordering/paging/count must be byte-identical with and without the flag (shown-never-applied / no-regression)."

changelog:
  - date: "2026-06-07"
    feature: "viewer-counter-claim-list-flags"
    change: "slice-12 DISCUSS — at-a-glance counter flag on /claims list (J-003b). Batch counter_presence_for read (no N+1); flag reuses slice-11 COUNTERED_PRESENCE_FLAG; shown-never-applied + no-regression on slice-06 list."
